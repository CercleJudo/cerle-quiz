version: '3.8'

services:
  app:
    build: .
    container_name: cerle_quiz_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1

  nginx:
    image: nginx:stable
    container_name: cerle_quiz_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certs:/etc/letsencrypt
      - certs-data:/var/lib/letsencrypt
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - app

volumes:
  certs:
  certs-data:
